<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración - Jerseys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Comfortaa', sans-serif; }
    body { background:#07111f; color:#fff; padding:40px; }
    .top-buttons { display:flex; gap:15px; margin-bottom:30px; flex-wrap:wrap; }
    button { border:none; cursor:pointer; transition:.2s ease; border-radius:12px; font-weight:700; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .primary-btn { background:#2490ff; color:white; padding:14px 22px; }
    .secondary-btn { background:#142238; color:white; padding:14px 22px; border:1px solid #23344f; }
    .danger-btn { background:#d64545; color:white; padding:14px 24px; }
    
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(4,14,28,0.95); display:none; justify-content:center; align-items:center; z-index:1000; padding:20px; }
    .modal-content { background:#0b1729; border:1px solid #1d314d; border-radius:24px; padding:30px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; }
    
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px; }
    .field { display:flex; flex-direction:column; gap:8px; margin-bottom:15px; }
    .full { grid-column: 1 / -1; }
    label { font-size:13px; color:#9eb1ca; }
    input, select, textarea { background:#07101d; border:1px solid #213754; color:white; padding:12px; border-radius:10px; outline:none; }
    
    .hidden { display: none; }
    .status-msg { margin-top:10px; font-size:14px; font-weight:bold; }
  </style>
</head>
<body>

  <h1>Administración de Inventario</h1>
  <p style="color:#9eb1ca; margin-bottom:20px;">Gestiona tus jerseys y existencias</p>

  <div class="top-buttons">
    <button class="primary-btn" onclick="openAddModal()">+ Agregar Nueva Prenda</button>
    <button class="secondary-btn" onclick="openManageModal()">🔍 Gestionar SKU Existente</button>
    <a href="index.html" style="text-decoration:none;"><button class="secondary-btn">Ver Catálogo Público</button></a>
  </div>

  <div id="addModal" class="modal">
    <div class="modal-content">
      <h2>Nueva Prenda</h2>
      <form id="addForm">
        <div class="form-grid">
          <div class="field full"><label>Equipo</label><input type="text" name="equipo" required></div>
          <div class="field"><label>Año</label><input type="text" name="year" placeholder="e.g. 2024"></div>
          <div class="field"><label>Precio (Q)</label><input type="number" name="precio" required></div>
          <div class="field">
            <label>Talla</label>
            <select name="talla">
              <option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
            </select>
          </div>
          <div class="field">
            <label>Tipo</label>
            <select name="tipo">
              <option>Casa</option><option>Visita</option><option>Entrenamiento</option><option>Firmada</option>
            </select>
          </div>
          <div class="field full"><label>Imagen</label><input type="file" id="addFile" accept="image/*"></div>
          <div class="field full">
            <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
              <input type="checkbox" name="disponible" checked> ¿Está disponible para venta?
            </label>
          </div>
        </div>
        <div class="top-buttons" style="margin-top:20px;">
          <button type="submit" class="primary-btn" id="saveAddBtn">Guardar Prenda</button>
          <button type="button" class="secondary-btn" onclick="closeModal('addModal')">Cancelar</button>
        </div>
        <div id="addStatus" class="status-msg"></div>
      </form>
    </div>
  </div>

  <div id="manageModal" class="modal">
    <div class="modal-content">
      <h2>Buscar y Editar SKU</h2>
      <div class="field full" style="margin-top:15px;">
        <input type="text" id="lookupSku" placeholder="Ingresa SKU (ej: C0001)">
        <button class="primary-btn" onclick="loadSku()" style="margin-top:10px;">Buscar</button>
      </div>

      <div id="editArea" class="hidden">
        <form id="editForm">
          <div class="form-grid">
            <div class="field full"><label>Equipo</label><input type="text" id="editEquipo" name="equipo"></div>
            <div class="field"><label>Precio</label><input type="number" id="editPrecio" name="precio"></div>
            <div class="field">
              <label style="display:flex; align-items:center; gap:10px; cursor:pointer; margin-top:30px;">
                <input type="checkbox" id="editAvailable" name="disponible"> Disponible
              </label>
            </div>
          </div>
          <div class="top-buttons" style="margin-top:20px;">
            <button type="submit" class="primary-btn">Actualizar Datos</button>
            <button type="button" class="danger-btn" onclick="actionSku('markSold')">Marcar Vendido</button>
          </div>
        </form>
      </div>
      <button class="secondary-btn" onclick="closeModal('manageModal')" style="margin-top:10px; width:100%;">Cerrar</button>
      <div id="manageStatus" class="status-msg"></div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyQJiY7GWJKashY_gl57P_gQCaZknQpXBBLIOV8_6EXRRG9Zmv7wDjldSJZ_OEWpFlZMQ/exec";

    function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
    function openManageModal() { document.getElementById('manageModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // CONVERT IMAGE TO BASE64
    async function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // ADD NEW ITEM
    document.getElementById('addForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveAddBtn');
      const status = document.getElementById('addStatus');
      btn.disabled = true;
      status.innerText = "Subiendo prenda...";

      const formData = new FormData(e.target);
      const fileInput = document.getElementById('addFile');
      let base64 = "";
      if(fileInput.files[0]) base64 = await toBase64(fileInput.files[0]);

      const payload = {
        action: 'addItem',
        equipo: formData.get('equipo'),
        year: formData.get('year'),
        precio: formData.get('precio'),
        talla: formData.get('talla'),
        tipo: formData.get('tipo'),
        disponible: formData.get('disponible') === 'on',
        imageBase64: base64
      };

      try {
        const resp = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const res = await resp.json();
        if(res.success) {
          alert("¡Éxito! SKU asignado: " + res.sku);
          location.reload();
        }
      } catch(err) {
        status.innerText = "Error al guardar.";
        btn.disabled = false;
      }
    };

    // LOAD SKU DATA
    async function loadSku() {
      const sku = document.getElementById('lookupSku').value;
      const status = document.getElementById('manageStatus');
      status.innerText = "Buscando...";
      
      try {
        const resp = await fetch(`${WEB_APP_URL}?action=getSku&sku=${sku}`);
        const res = await resp.json();
        if(res.success) {
          document.getElementById('editArea').classList.remove('hidden');
          document.getElementById('editEquipo').value = res.item.equipo;
          document.getElementById('editPrecio').value = res.item.precio;
          document.getElementById('editAvailable').checked = res.item.disponible;
          status.innerText = "";
        } else {
          status.innerText = "SKU no encontrado.";
        }
      } catch(err) { status.innerText = "Error de conexión."; }
    }

    async function actionSku(action) {
      const sku = document.getElementById('lookupSku').value;
      const resp = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, sku }) });
      const res = await resp.json();
      if(res.success) { alert("Acción completada."); location.reload(); }
    }
  </script>
</body>
</html>
