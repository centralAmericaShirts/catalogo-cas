<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Jerseys</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Comfortaa', sans-serif; }
    body { background:#07111f; color:white; padding:30px; }
    
    .filters-container { background:#0b1729; border:1px solid #1d314d; border-radius:22px; padding:24px; margin-bottom:24px; }
    .filters-grid { display:grid; grid-template-columns:2fr 1fr 1fr; gap:18px; }
    .field-group { display:flex; flex-direction:column; gap:8px; }
    label { font-size:14px; color:#d9e5f5; font-weight:600; }
    input, select { width:100%; padding:14px 16px; border-radius:14px; border:1px solid #213754; background:#07101d; color:white; outline:none; }
    
    /* NUEVO: Contenedor para alinear Checkbox y Botón */
    .search-actions { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-top: 20px; }
    .checkbox-row { display:flex; align-items:center; gap:10px; white-space: nowrap; }
    .checkbox-row input { width: 18px; height: 18px; cursor: pointer; }
    
    .search-btn { background:#2490ff; border:none; color:white; padding:14px 24px; border-radius:14px; font-weight:700; cursor:pointer; flex-grow: 1; }
    .search-btn:hover { background:#42a0ff; }

    .catalog-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:24px; }
    .card { background:#081426; border:1px solid #1b2f49; border-radius:24px; overflow:hidden; position:relative; display:flex; flex-direction:column; transition: .2s; }
    .card:hover { transform: translateY(-5px); }
    
    .card-image-container { position:relative; width:100%; height:300px; background:#0a1728; }
    .card-image { width:100%; height:100%; object-fit:cover; }
    
    .badge { position:absolute; top:14px; padding:8px 14px; border-radius:10px; font-size:11px; font-weight:700; }
    .badge-available { left:14px; background:#2a9fff; color:#041426; }
    .badge-sold { left:14px; background:#cfd5dd; color:#1f2c3e; }
    .badge-type { right:14px; background:#232f43; color:white; }
    
    .card-body { padding:18px; flex-grow:1; }
    .price { color:#1ea0ff; font-size:20px; font-weight:700; margin:10px 0; }
    .ws-btn { background:#25d366; color:white; text-decoration:none; display:block; text-align:center; padding:12px; border-radius:12px; font-weight:700; margin-top:10px; }
    
    .loading { text-align:center; padding:40px; color:#9eb1ca; grid-column:1/-1; }

    /* Ajustes para Móviles */
    @media(max-width:850px){ 
      body { padding: 15px; }
      .filters-grid { grid-template-columns:1fr; } 
      .search-actions { flex-direction: column; align-items: flex-start; gap: 15px; }
      .search-btn { width: 100%; }
      .catalog-grid { grid-template-columns:repeat(2,1fr); gap: 10px; } 
      .card-image-container { height:180px; } 
      .badge { font-size: 9px; padding: 5px 8px; }
    }
  </style>
</head>
<body>

  <div class="filters-container">
    <div class="filters-grid">
      <div class="field-group">
        <label>Buscar Equipo o SKU</label>
        <input type="text" id="searchInput" placeholder="Ej: Barcelona o C001" oninput="applyFilters()">
      </div>
      <div class="field-group">
        <label>Talla</label>
        <select id="sizeFilter" onchange="applyFilters()">
          <option value="">Todas</option>
          <option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
        </select>
      </div>
      <div class="field-group">
        <label>Tipo</label>
        <select id="typeFilter" onchange="applyFilters()">
          <option value="">Todos</option>
          <option>Casa</option><option>Visita</option><option>Entrenamiento</option><option>Firmada</option>
        </select>
      </div>
    </div>

    <div class="search-actions">
      <div class="checkbox-row">
        <input type="checkbox" id="availableOnly" checked onchange="applyFilters()">
        <label for="availableOnly">Solo Disponibles</label>
      </div>
      <button class="search-btn" onclick="applyFilters()">Actualizar Catálogo</button>
    </div>
  </div>

  <div id="resultCount" style="margin-bottom:15px; color:#9eb1ca; font-weight: bold;">Cargando inventario...</div>
  
  <div class="catalog-grid" id="catalogGrid">
    <div class="loading">Cargando jerseys...</div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyQJiY7GWJKashY_gl57P_gQCaZknQpXBBLIOV8_6EXRRG9Zmv7wDjldSJZ_OEWpFlZMQ/exec"; 
    const WS_NUMBER = "50258656376"; 
    
    let allItems = [], filteredItems = [];

    async function loadInventory(){
      const cb = 'callback_' + Date.now();
      const script = document.createElement('script');
      window[cb] = (data) => {
        allItems = data;
        applyFilters();
        delete window[cb];
        script.remove();
      };
      script.src = `${WEB_APP_URL}?action=getInventory&callback=${cb}`;
      document.body.appendChild(script);
    }

    function applyFilters(){
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const size = document.getElementById('sizeFilter').value;
      const type = document.getElementById('typeFilter').value;
      const onlyAvail = document.getElementById('availableOnly').checked;

      filteredItems = allItems.filter(item => {
        const matchesSearch = !search || 
                             String(item.sku).toLowerCase().includes(search) || 
                             String(item.equipo).toLowerCase().includes(search);
        
        const matchesSize = !size || String(item.talla) === size;
        const matchesType = !type || String(item.tipo) === type;
        
        // Mantiene la lógica de disponibilidad del Apps Script (true/false)
        const matchesAvail = !onlyAvail || item.disponible === true;
        const activeOnly = item.estado !== 'Eliminado';

        return matchesSearch && matchesSize && matchesType && matchesAvail && activeOnly;
      });
      render();
    }

    function render(){
      const grid = document.getElementById('catalogGrid');
      document.getElementById('resultCount').innerText = `${filteredItems.length} prendas encontradas`;
      
      if(filteredItems.length === 0) {
        grid.innerHTML = '<div class="loading">No se encontraron resultados.</div>';
        return;
      }

      grid.innerHTML = filteredItems.map(item => {
        const wsMsg = encodeURIComponent(`Hola, me interesa el jersey del ${item.equipo} '${item.year} (SKU: ${item.sku})`);
        return `
        <div class="card">
          <div class="card-image-container">
            <img class="card-image" src="${item.imagen || 'https://placehold.co/400'}" loading="lazy">
            <div class="badge ${item.disponible ? 'badge-available' : 'badge-sold'}">
              ${item.disponible ? 'DISPONIBLE' : 'VENDIDO'}
            </div>
            <div class="badge badge-type">${String(item.tipo).toUpperCase()}</div>
          </div>
          <div class="card-body">
            <h3 style="font-size:16px; margin-bottom: 5px;">${item.equipo} '${item.year}</h3>
            <div class="price">Q${item.precio}</div>
            <div style="font-size:12px; color:#8293ac; margin-bottom: 10px;">Talla: ${item.talla} | SKU: ${item.sku}</div>
            <a href="https://wa.me/${WS_NUMBER}?text=${wsMsg}" class="ws-btn" target="_blank">Consultar WhatsApp</a>
          </div>
        </div>
      `}).join('');
    }

    loadInventory();
  </script>
</body>
</html>
