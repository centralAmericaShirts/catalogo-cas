<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAS</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css"> 
</head>

<body class="index-page">

  <nav class="navbar">
    <div class="nav-brand">
      <img src="logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'">
      <div class="nav-text-container">
        <span class="nav-title">Central America Shirts</span>
        <h6 class="nav-slogan">Llevando el fútbol de Guate a todo el mundo 🇧🇷🇦🇷🇨🇴🇺🇲🇨🇱🇲🇽</h6>
      </div>
    </div>
  </nav>
	
  <div class="container">
        <div class="home-message-group">
          <h2>Listado de Camisolas disponibles en tienda.</h2>
          <label2>Vía 4 1-17 Zona 4, 4 Grados Norte</label2>
        </div>    
  </div>     
    
  <div class="container">
    <div class="filters-container">
      <div class="filters-grid">
        <div class="field-group">
          <label>Buscar por Equipo ó Código</label>
          <input type="text" id="searchInput" placeholder="Ej: Milan..." oninput="applyFilters()">
        </div>
        <div class="field-group">
          <label>Talla</label>
          <select id="sizeFilter" onchange="applyFilters()">
            <option value="">Todas</option>
            <option>XS</option><option>S</option><option>M</option><option>L</option>
            <option>XL</option><option>XXL</option>
          </select>
        </div>
        <div class="field-group">
          <label>Tipo de Camisola</label>
          <select id="typeFilter" onchange="applyFilters()">
            <option value="">Todos</option>
            <option>Casa</option><option>Visita</option><option>Entrenamiento</option>
            <option>Firmada</option><option>Otros</option>
          </select>
        </div>
        <div class="field-group">
          <label>Ordenar por</label>
          <select id="sortOrder" onchange="applyFilters()">
            <option value="none">ID de producto</option>
            <option value="p-low">Precio: Menor a Mayor</option>
            <option value="p-high">Precio: Mayor a Menor</option>
            <option value="az">A - Z</option>
          </select>
        </div>
      </div>
    </div>

    <div id="resultCount" style="margin-bottom:15px; color:#9eb1ca; font-size: 14px;">Cargando...</div>
    
    <div class="catalog-grid" id="catalogGrid">
      <div class="loading">Cargando inventario...</div>
    </div>
  </div>

  <div class="modal" id="productModal" style="display:none; position:fixed; z-index:1001; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; padding:20px;">
    <div class="modal-content" style="background:#081426; max-width:850px; width:100%; border-radius:22px; border:1px solid #1f3350; position:relative; display:flex; flex-direction:row; flex-wrap:wrap; overflow:hidden; max-height:90vh; overflow-y:auto;">
      <span onclick="closeProductModal()" style="position:absolute; right:20px; top:15px; font-size:28px; color:#8aa4c7; cursor:pointer; z-index:10;">&times;</span>
      
      <div style="flex:1; min-width:300px; background:#0a1728; position:relative; display:flex; flex-direction:column;">
        <img id="modalMainImage" src="" style="width:100%; height:400px; object-fit:contain; padding:20px;">
        <div id="modalThumbnails" style="display:flex; overflow-x:auto; gap:10px; padding:15px; background:#07111f; min-height:90px;">
           </div>
      </div>
      
      <div style="flex:1; min-width:300px; padding:30px; display:flex; flex-direction:column;">
        <h2 id="modalTitle" style="color:#2490ff; margin-bottom:10px; padding-right: 20px;"></h2>
        <div id="modalPrice" class="price" style="font-size:26px; margin-bottom:20px;"></div>
        <p style="color:#d9e5f5; margin-bottom:10px;"><strong>Talla:</strong> <span id="modalSize"></span></p>
        <p style="color:#d9e5f5; margin-bottom:10px;"><strong>Tipo:</strong> <span id="modalType"></span></p>
        <p style="color:#d9e5f5; margin-bottom:10px;"><strong>SKU:</strong> <span id="modalSku"></span></p>
        
        <div style="margin-top:20px; background:#0a1728; padding:15px; border-radius:12px; border: 1px solid #1b2f49;">
            <p style="color:#d9e5f5; margin-bottom:5px;"><strong>Descripción / Notas:</strong></p>
            <p style="color:#9eb1ca; font-size:14px; line-height: 1.5;" id="modalNotes"></p>
        </div>
        
        <a id="modalWsBtn" href="#" class="ws-btn-full" target="_blank">Consultar WhatsApp</a>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyQJcgLt6SLul6TUDhMGmDKBVjSV9DRysKV5rxxDb0dZvtmE4uEXjksVEkeFoSQoG4SXQ/exec"; 
    const WS_NUMBER = "50258656376"; 
    
    let allItems = [], filteredItems = [];

    async function loadInventory(){
      const cb = 'callback_' + Date.now();
      const script = document.createElement('script');
      window[cb] = (data) => {
        allItems = data;
        applyFilters();
        delete window[cb];
        script.remove();
      };
      script.src = `${WEB_APP_URL}?action=getInventory&callback=${cb}`;
      document.body.appendChild(script);
    }

    function applyFilters(){
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const size = document.getElementById('sizeFilter').value;
      const type = document.getElementById('typeFilter').value;
      const onlyAvail = true;
      const sort = document.getElementById('sortOrder').value;

      filteredItems = allItems.filter(item => {
        const matchesSearch = !search || 
                             String(item.sku).toLowerCase().includes(search) || 
                             String(item.equipo).toLowerCase().includes(search);
        
        const matchesSize = !size || String(item.talla) === size;
        const matchesType = !type || String(item.tipo) === type;
        
        const isDisponible = item.disponible === true || String(item.disponible).toUpperCase() === 'SÍ';
        const matchesAvail = !onlyAvail || isDisponible;
        const activeOnly = item.estado !== 'Eliminado';

        return matchesSearch && matchesSize && matchesType && matchesAvail && activeOnly;
      });

      if (sort === 'p-low') filteredItems.sort((a, b) => Number(a.precio) - Number(b.precio));
      if (sort === 'p-high') filteredItems.sort((a, b) => Number(b.precio) - Number(a.precio));
      if (sort === 'az') filteredItems.sort((a, b) => a.equipo.localeCompare(b.equipo));

      render();
    }

    function render(){
      const grid = document.getElementById('catalogGrid');
      document.getElementById('resultCount').innerText = `${filteredItems.length} prendas encontradas`;
      
      if(filteredItems.length === 0) {
        grid.innerHTML = '<div class="loading">No se encontraron resultados.</div>';
        return;
      }

      grid.innerHTML = filteredItems.map(item => {
        const wsMsg = encodeURIComponent(`Hola, me interesa esta prenda de ${item.equipo} '${item.year} (ID: ${item.sku})`);
        const isDisponible = item.disponible === true || String(item.disponible).toUpperCase() === 'SÍ';
        
		return `
		<div class="card">
		  <div class="card-image-container">
		    <img class="card-image" src="${item.imagen || 'https://placehold.co/400'}" loading="lazy">
		    
		    <div class="badge badge-type">${String(item.tipo).toUpperCase()}</div>
		  </div>
		  <div class="card-body">
            <h3 style="font-size:16px; margin-bottom: 5px;">${item.equipo} '${item.year}</h3>
            <div class="price">Q${item.precio}</div>
            <div style="font-size:12px; color:#8293ac; margin-bottom: 15px;">Talla: ${item.talla} | SKU: ${item.sku}</div>
            
            <div class="card-actions">
                <button class="view-btn" onclick="openProductModal('${item.sku}')">
				  <span class="txt-desktop">Ver Producto</span>
				  <span class="txt-mobile">Ver</span>
				</button>
                <a href="https://wa.me/${WS_NUMBER}?text=${wsMsg}" class="ws-icon-btn" target="_blank" title="Consultar por WhatsApp">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766 0 1.018.265 2.012.768 2.885l-.817 2.984 3.052-.801a5.727 5.727 0 002.765.713h.001c3.181 0 5.768-2.586 5.768-5.766 0-3.181-2.587-5.767-5.769-5.781zm3.167 8.351c-.173.488-.988.941-1.378 1.002-.389.061-.832.138-2.612-.598-2.115-.875-3.468-3.023-3.573-3.164-.105-.141-.853-1.135-.853-2.164 0-1.029.531-1.536.718-1.731.187-.195.405-.244.538-.244.133 0 .266.002.385.006.126.004.296-.048.455.337.173.418.59 1.439.643 1.545.053.106.088.23.018.371-.07.141-.105.23-.211.353-.105.123-.219.266-.314.354-.105.097-.215.203-.095.412.12.209.535.887 1.148 1.434.79.706 1.464.925 1.674 1.031.21.106.333.088.456-.053.123-.141.531-.618.675-.83.141-.212.282-.176.474-.106.192.071 1.215.572 1.425.678.21.106.35.159.4.247.05.088.05.512-.123 1.002zM12.002 2C6.478 2 2 6.477 2 12c0 1.761.463 3.42 1.306 4.887L2 22l5.233-1.354A9.957 9.957 0 0012.002 22c5.523 0 10-4.477 10-10S17.526 2 12.002 2z"/></svg>
                </a>
            </div>
          </div>
        </div>
      `}).join('');
    }
	
    // LOGICA DEL MODAL POP-UP
    function openProductModal(sku) {
      const item = allItems.find(i => i.sku === sku);
      if(!item) return;

      document.getElementById('modalTitle').innerText = `${item.equipo} '${item.year}`;
      document.getElementById('modalPrice').innerText = `Q${item.precio}`;
      document.getElementById('modalSize').innerText = item.talla;
      document.getElementById('modalType').innerText = item.tipo;
      document.getElementById('modalSku').innerText = item.sku;
      document.getElementById('modalNotes').innerText = item.notas || "Sin notas adicionales.";
      
      const wsMsg = encodeURIComponent(`Hola, me interesa el jersey del ${item.equipo} '${item.year} (SKU: ${item.sku})`);
      document.getElementById('modalWsBtn').href = `https://wa.me/${WS_NUMBER}?text=${wsMsg}`;

      // Configuración de la Galería
      const mainImg = document.getElementById('modalMainImage');
      const thumbContainer = document.getElementById('modalThumbnails');
      
      let images = [];
      if (item.galeria) {
          images = typeof item.galeria === 'string' ? item.galeria.split(',') : item.galeria;
      } else {
          images = [item.imagen || 'https://placehold.co/400'];
      }

      mainImg.src = images[0];
      thumbContainer.innerHTML = images.map(src => 
        `<img src="${src}" onclick="document.getElementById('modalMainImage').src='${src}'" 
          style="width:70px; height:70px; object-fit:cover; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:0.2s;" 
          onmouseover="this.style.borderColor='#2490ff'" onmouseout="this.style.borderColor='transparent'">`
      ).join('');

      document.getElementById('productModal').style.display = "flex";
    }

    function closeProductModal() {
      document.getElementById('productModal').style.display = "none";
    }

    // Cerrar el modal al hacer click afuera
    window.addEventListener('click', function(e) {
      const modal = document.getElementById('productModal');
      if (e.target === modal) closeProductModal();
    });

    loadInventory();
  </script>
</body>
</html>
