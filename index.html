<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAS</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Comfortaa', sans-serif; }
    body { background:#07111f; color:white; padding-top: 90px; padding-bottom: 40px; }

    /* NAVEGACIÓN */
    /* --- Estilo Desktop (Default) --- */
    .navbar {position: fixed;top: 0; left: 0; width: 100%;height: 70px; background: #0b1729; border-bottom: 1px solid #1d314d; display: flex; align-items: center; padding: 0 30px; z-index: 1000; justify-content: space-between}
    .nav-brand {  display: flex;  align-items: center;  gap: 15px; }
    .nav-text-container { display: flex; align-items: baseline; gap: 20px;}
    .nav-logo { height: 45px; width: 45px; object-fit: contain; }
    .nav-title { font-size: 20px; font-weight: 700; color: #2490ff; white-space: nowrap; }
    .nav-slogan { margin: 0; color: white; }

    /* --- Estilo Mobile --- */
    @media (max-width: 768px) {
       .navbar {   height: auto;   padding: 10px 15px; }
      .nav-text-container {   flex-direction: column; gap: 2px;align-items: flex-start}
      .nav-title {font-size: 16px;white-space: normal;}
      .nav-slogan {font-size: 11px;}
      }

    /* FILTROS */
    .container { padding: 0 20px; max-width: 1200px; margin: 0 auto; }
    .filters-container { background:#0b1729; border:1px solid #1d314d; border-radius:22px; padding:24px; margin-bottom:24px; }
    .filters-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:18px; align-items: end; }
    .field-group { display:flex; flex-direction:column; gap:8px; }
    .home-message-group { display:justify; gap:8px; text-align: center; padding:10px}
    label { font-size:13px; color:#d9e5f5; font-weight:600; }
    h2 { font-size:24px; color:#d9e5f5; font-weight:600; }
    label2 { font-size:24px; color:#2490ff; font-weight:600; }
    input, select { width:100%; padding:12px; border-radius:12px; border:1px solid #213754; background:#07101d; color:white; outline:none; font-size:14px; }
    
    .search-actions { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .checkbox-row { display:flex; align-items:center; gap:10px; white-space: nowrap; }
    .checkbox-row input { width: 18px; height: 18px; cursor: pointer; }
    
    .search-btn { background:#2490ff; border:none; color:white; padding:14px 24px; border-radius:14px; font-weight:700; cursor:pointer; flex-grow: 1; }

    /* CATALOGO */
    .catalog-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:24px; }
    .card { background:#081426; border:1px solid #1b2f49; border-radius:24px; overflow:hidden; position:relative; display:flex; flex-direction:column; transition: .2s; }
    .card:hover { transform: translateY(-5px); }
    
    .card-image-container { position:relative; width:100%; height:300px; background:#0a1728; }
    .card-image { width:100%; height:100%; object-fit:cover; }
    
    .badge { position:absolute; top:14px; padding:8px 14px; border-radius:10px; font-size:11px; font-weight:700; }
    .badge-available { left:14px; background:#2a9fff; color:#041426; }
    .badge-sold { left:14px; background:#cfd5dd; color:#1f2c3e; }
    .badge-type { right:14px; background: rgba(35, 47, 67, 0.85); color:white; }
    
    .card-body { padding:18px; flex-grow:1; display: flex; flex-direction: column; }
    .price { color:#1ea0ff; font-size:20px; font-weight:700; margin:10px 0; }
    .ws-btn { background:#25d366; color:white; text-decoration:none; display:block; text-align:center; padding:12px; border-radius:12px; font-weight:700; margin-top:auto; }
    
    .loading { text-align:center; padding:40px; color:#9eb1ca; grid-column:1/-1; }

    @media(max-width:850px){ 
      .filters-grid { grid-template-columns: 1fr 1fr; }
      .filters-grid .field-group:first-child { grid-column: span 2; }
      .catalog-grid { grid-template-columns:repeat(2,1fr); gap: 12px; } 
      .card-image-container { height:200px; } 
      .nav-title { font-size: 16px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <img src="logo.png" alt="Logo" class="nav-logo">
      <div class="nav-text-container">
        <span class="nav-title">Central America Shirts</span>
        <h6 class="nav-slogan">Llevando el fútbol de Guate a todo el mundo 🇧🇷🇦🇷🇨🇴🇺🇲🇨🇱🇲🇽</h6>
      </div>
    </div>
  </nav>
	
  <div class="container">
        <div class="home-message-group">
          <h2>Listado de Camisolas disponibles en tienda.</h2>
          <label2>Vía 4  1-17 Zona 4, 4 Grados Norte</label2>
        </div>    
  </div>     
    
  <div class="container">
    <div class="filters-container">
      <div class="filters-grid">
        <div class="field-group">
          <label>Buscar por Equipo ó Código</label>
          <input type="text" id="searchInput" placeholder="Ej: Milan..." oninput="applyFilters()">
        </div>
        <div class="field-group">
          <label>Talla</label>
          <select id="sizeFilter" onchange="applyFilters()">
            <option value="">Todas</option>
            <option>XS</option><option>S</option><option>M</option><option>L</option>
            <option>XL</option><option>XXL</option>
          </select>
        </div>
        <div class="field-group">
          <label>Tipo de Camisola</label>
          <select id="typeFilter" onchange="applyFilters()">
            <option value="">Todos</option>
            <option>Casa</option><option>Visita</option><option>Entrenamiento</option>
            <option>Firmada</option><option>Otros</option>
          </select>
        </div>
        <div class="field-group">
          <label>Ordenar por</label>
          <select id="sortOrder" onchange="applyFilters()">
            <option value="none">ID de producto</option>
            <option value="p-low">Precio: Menor a Mayor</option>
            <option value="p-high">Precio: Mayor a Menor</option>
            <option value="az">A - Z</option>
          </select>
        </div>
      </div>

      <!--
      <div class="search-actions">
        <div class="checkbox-row">
          <input type="checkbox" id="availableOnly" checked onchange="applyFilters()">
          <label for="availableOnly">Solo Disponibles</label>
        </div>
         <button class="search-btn" onclick="applyFilters()">Actualizar Catálogo</button> 
      </div> 
      -->
    </div>

    <div id="resultCount" style="margin-bottom:15px; color:#9eb1ca; font-size: 14px;">Cargando...</div>
    
    <div class="catalog-grid" id="catalogGrid">
      <div class="loading">Cargando inventario...</div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyQJcgLt6SLul6TUDhMGmDKBVjSV9DRysKV5rxxDb0dZvtmE4uEXjksVEkeFoSQoG4SXQ/exec"; 
    const WS_NUMBER = "50258656376"; 
    
    let allItems = [], filteredItems = [];

    async function loadInventory(){
      const cb = 'callback_' + Date.now();
      const script = document.createElement('script');
      window[cb] = (data) => {
        allItems = data;
        applyFilters();
        delete window[cb];
        script.remove();
      };
      script.src = `${WEB_APP_URL}?action=getInventory&callback=${cb}`;
      document.body.appendChild(script);
    }

    function applyFilters(){
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const size = document.getElementById('sizeFilter').value;
      const type = document.getElementById('typeFilter').value;
      // const onlyAvail = document.getElementById('availableOnly').checked;
      const onlyAvail = true;
      const sort = document.getElementById('sortOrder').value;

      filteredItems = allItems.filter(item => {
        const matchesSearch = !search || 
                             String(item.sku).toLowerCase().includes(search) || 
                             String(item.equipo).toLowerCase().includes(search);
        
        const matchesSize = !size || String(item.talla) === size;
        const matchesType = !type || String(item.tipo) === type;
        
        // CORRECCIÓN: Acepta tanto booleanos (true) como el texto "Sí"
        const isDisponible = item.disponible === true || String(item.disponible).toUpperCase() === 'SÍ';
        const matchesAvail = !onlyAvail || isDisponible;
        const activeOnly = item.estado !== 'Eliminado';

        return matchesSearch && matchesSize && matchesType && matchesAvail && activeOnly;
      });

      // LÓGICA DE ORDENAMIENTO
      if (sort === 'p-low') filteredItems.sort((a, b) => Number(a.precio) - Number(b.precio));
      if (sort === 'p-high') filteredItems.sort((a, b) => Number(b.precio) - Number(a.precio));
      if (sort === 'az') filteredItems.sort((a, b) => a.equipo.localeCompare(b.equipo));

      render();
    }

    function render(){
      const grid = document.getElementById('catalogGrid');
      document.getElementById('resultCount').innerText = `${filteredItems.length} prendas encontradas`;
      
      if(filteredItems.length === 0) {
        grid.innerHTML = '<div class="loading">No se encontraron resultados.</div>';
        return;
      }

      grid.innerHTML = filteredItems.map(item => {
        const wsMsg = encodeURIComponent(`Hola, me interesa el jersey del ${item.equipo} '${item.year} (SKU: ${item.sku})`);
        const isDisponible = item.disponible === true || String(item.disponible).toUpperCase() === 'SÍ';
        
        return `
        <div class="card">
          <div class="card-image-container">
            <img class="card-image" src="${item.imagen || 'https://placehold.co/400'}" loading="lazy">
            <div class="badge ${isDisponible ? 'badge-available' : 'badge-sold'}">
              ${isDisponible ? 'DISPONIBLE' : 'VENDIDO'}
            </div>
            <div class="badge badge-type">${String(item.tipo).toUpperCase()}</div>
          </div>
          <div class="card-body">
            <h3 style="font-size:16px; margin-bottom: 5px;">${item.equipo} '${item.year}</h3>
            <div class="price">Q${item.precio}</div>
            <div style="font-size:12px; color:#8293ac; margin-bottom: 15px;">Talla: ${item.talla} | SKU: ${item.sku}</div>
            
            <a href="https://wa.me/${WS_NUMBER}?text=${wsMsg}" class="ws-btn" target="_blank">Consultar WhatsApp</a>
          </div>
        </div>
      `}).join('');
    }

    loadInventory();
  </script>
	<div class="modal" id="productModal" style="display:none; position:fixed; z-index:1001; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; padding:20px;">
	  <div class="modal-content" style="background:#081426; max-width:800px; width:100%; border-radius:22px; position:relative; display:flex; flex-direction:column; md:flex-row; overflow:hidden;">
	    <span onclick="closeProductModal()" style="position:absolute; right:20px; top:15px; font-size:28px; color:white; cursor:pointer; z-index:10;">&times;</span>
	    
	    <div style="display:flex; flex-wrap:wrap;">
	      <div style="flex:1; min-width:300px; background:#0a1728; position:relative;">
	        <img id="modalMainImage" src="" style="width:100%; height:400px; object-fit:contain;">
	        <div id="modalThumbnails" style="display:flex; overflow-x:auto; gap:10px; padding:10px; background:#07111f;">
	           </div>
	      </div>
	      
	      <div style="flex:1; min-width:300px; padding:30px;">
	        <h2 id="modalTitle" style="color:#2490ff; margin-bottom:10px;"></h2>
	        <div id="modalPrice" class="price" style="font-size:24px; margin-bottom:20px;"></div>
	        <p style="color:#d9e5f5; margin-bottom:8px;"><strong>Talla:</strong> <span id="modalSize"></span></p>
	        <p style="color:#d9e5f5; margin-bottom:8px;"><strong>Tipo:</strong> <span id="modalType"></span></p>
	        <p style="color:#d9e5f5; margin-bottom:8px;"><strong>SKU:</strong> <span id="modalSku"></span></p>
	        <p style="color:#9eb1ca; margin-top:20px; font-size:14px;" id="modalNotes"></p>
	        
	        <a id="modalWsBtn" href="#" class="ws-btn" target="_blank" style="margin-top:30px;">Consultar WhatsApp</a>
	      </div>
	    </div>
	  </div>
	</div>
</body>
</html>
